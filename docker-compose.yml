version: "3.8"

services:
  solana-bot:
    build: ./solana-telegram-bot
    container_name: solana-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - solana-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "const fs=require('fs');const h=JSON.parse(fs.readFileSync('/app/data/health.json'));process.exit(Date.now()-new Date(h.timestamp).getTime()>120000?1:0)"]
      interval: 60s
      timeout: 10s
      retries: 3

  poly-maker:
    build:
      context: .
      dockerfile: polymarket-maker/Dockerfile
    container_name: poly-maker
    restart: unless-stopped
    env_file: .env
    volumes:
      - poly-data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import json,time;h=json.load(open('/app/data/health.json'));exit(0 if time.time()-h.get('timestamp',0)<120 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3

  funding-arb:
    build:
      context: .
      dockerfile: funding-arb/Dockerfile
    container_name: funding-arb
    restart: unless-stopped
    env_file: .env
    volumes:
      - arb-data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import json,time;h=json.load(open('/app/data/health.json'));exit(0 if time.time()-h.get('timestamp',0)<120 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3

  monitor:
    build:
      context: .
      dockerfile: monitoring/Dockerfile
    container_name: monitor
    restart: unless-stopped
    env_file: .env
    volumes:
      - solana-data:/app/data/solana-bot:ro
      - poly-data:/app/data/poly-maker:ro
      - arb-data:/app/data/funding-arb:ro
    depends_on:
      - solana-bot
      - poly-maker
      - funding-arb

volumes:
  solana-data:
  poly-data:
  arb-data:
